services:
    ai_project:
        image: postgres:15
        container_name: ai-project
        environment:
            POSTGRES_USER: root
            POSTGRES_PASSWORD: secret
            POSTGRES_DB: project
        ports:
            - "5002:5432"
        volumes:
            - ai_project_data:/var/lib/postgresql/data
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
        restart: unless-stopped
    
    ai_project_test:
        image: postgres:15
        container_name: ai-project-test
        environment:
            POSTGRES_USER: root
            POSTGRES_PASSWORD: secret
            POSTGRES_DB: project_test
        ports:
            - "5003:5432"
        volumes:
            - ai_project_test_data:/var/lib/postgresql/data
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
        restart: unless-stopped

volumes:
    ai_project_data:
    ai_project_test_data:
